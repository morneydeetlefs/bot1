<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>News Monitor</title>
    <style>
        body{ font-family:sans-serif; background:#111; color:#eee; padding:20px; }
        .alert{ background:#222; padding:10px; margin-bottom:10px; border-left:4px solid #6cf; }
        #log{ background:#000; padding:10px; height:150px; overflow-y:auto; font-family:monospace; font-size:12px; border:1px solid #444; }
        .logline{ color:#888; }
    </style>
</head>
<body>

    <h1>Live News Bot</h1>
    <input id="keywords" value="earthquake, volcano" style="width:250px;">
    <button onclick="startBot()">Start Bot</button>

    <h3>Alerts</h3>
    <div id="alerts"></div>

    <h3>System Log</h3>
    <div id="log"></div>

<script>
let seenPosts = new Set();

function log(msg) {
    const logBox = document.getElementById("log");
    const line = document.createElement("div");
    line.className = "logline";
    line.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
}

function startBot() {
    log("Bot initialized...");
    checkNews();
    setInterval(checkNews, 60000); // Check every minute
}

async function checkNews() {
    const kw = document.getElementById("keywords").value;
    const apiKey = "dff88a84a0a74239a42cb5a5ac2e245e";
    
    // Constructing URL with plus signs to be 100% safe
    const url = "https://newsapi.org" + encodeURIComponent(kw) + "&sortBy=publishedAt&apiKey=" + apiKey;

    log("Requesting: " + url);

    try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.status !== "ok") {
            log("API Error: " + data.message);
            return;
        }

        data.articles.forEach(art => {
            if (!seenPosts.has(art.url)) {
                seenPosts.add(art.url);
                
                const box = document.getElementById("alerts");
                const div = document.createElement("div");
                div.className = "alert";
                div.innerHTML = "<b>" + art.title + "</b><br><a href='" + art.url + "' target='_blank' style='color:#6cf'>Read more</a>";
                box.prepend(div);
                
                log("New match: " + art.title.substring(0, 30) + "...");
            }
        });
    } catch (err) {
        log("CRITICAL ERROR: " + err.message);
        log("Check if your internet or an ad-blocker is blocking newsapi.org");
    }
}
</script>
</body>
</html>
