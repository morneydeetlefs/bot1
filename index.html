<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Internet Monitoring Bot</title>
    <style>
        body{ font-family:Arial; background:#111; color:#eee; margin:20px; }
        h1{ color:#6cf; }
        #alerts, #all-posts { margin-top:20px; }
        .alert { background:#222; padding:10px; margin-bottom:10px; border-left:4px solid #6cf; }
        .post-entry { background:#1a1a1a; padding:8px; margin-bottom:5px; border-bottom:1px solid #333; font-size: 14px; }
        .keyword { color:#ff6; font-weight:bold; }
        #log { background:#000; padding:10px; margin-top:20px; height:150px; overflow-y:auto; font-family:monospace; font-size:13px; border:1px solid #444; }
        .logline { color:#aaa; }
        .match { color: #6cf; font-weight: bold; }
    </style>
</head>
<body>

<h1>Live Monitoring Bot</h1>

<div>
    Keywords (comma separated): 
    <input id="keywords" value="earthquake, volcano, eruption" style="width:300px;">
    <button onclick="startBot()">Start Bot</button>
</div>

<div id="status" style="margin-top:10px; color:#888;"></div>

<h2>Recent Matches (Alerts)</h2>
<div id="alerts"></div>

<h2>Last 10 Posts Fetched</h2>
<div id="all-posts"></div>

<h2>System Log</h2>
<div id="log"></div>

<script>
let seenPosts = new Set();
let keywords = [];

function log(message){
    const logBox = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    const line = document.createElement("div");
    line.className="logline";
    line.textContent = `[${time}] ${message}`;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
}

function startBot(){
    const input = document.getElementById("keywords").value;
    keywords = input.toLowerCase().split(",").map(x=>x.trim());
    
    document.getElementById("status").innerText = "Bot running... checking every 60s";
    log("Bot started with keywords: " + keywords.join(", "));
    
    // Run immediately, then every 60 seconds
    checkReddit();
    setInterval(checkReddit, 60000);
}

async function checkReddit() {
    log("Fetching latest posts via RSS Proxy...");
    const postDisplay = document.getElementById("all-posts");
    
    // Reddit RSS URL for r/news
    const redditRSS = "https://www.reddit.com";
    
    // Wrap the RSS link in the AllOrigins proxy to bypass CORS
   const proxyUrl = `https://corsproxy.io{encodeURIComponent(redditRSS)}`;


    try {
        const res = await fetch(proxyUrl);
        const data = await res.json();
        
        // Proxy returns the XML content as a string in data.contents
        const parser = new DOMParser();
        const xml = parser.parseFromString(data.contents, "text/xml");
        const entries = xml.querySelectorAll("entry");

        // Clear the preview area
        if (postDisplay) postDisplay.innerHTML = "";

        entries.forEach((entry, index) => {
            const id = entry.querySelector("id")?.textContent;
            const title = entry.querySelector("title")?.textContent;
            const link = entry.querySelector("link")?.getAttribute("href");

            // 1. Update the "Last 10" UI list
            if (index < 10 && postDisplay) {
                const div = document.createElement("div");
                div.className = "post-entry";
                div.textContent = title;
                postDisplay.appendChild(div);
            }

            // 2. Keyword Check & Alert Logic
            if (id && !seenPosts.has(id)) {
                seenPosts.add(id);
                const lowerTitle = title.toLowerCase();
                
                keywords.forEach(word => {
                    if (lowerTitle.includes(word)) {
                        log(`RSS MATCH: ${word}`);
                        addAlert(word, title, link);
                    }
                });
            }
        });
        
        log(`Scanned ${entries.length} items from the feed.`);
    } catch (err) {
        log("Fetch failed. The proxy might be down or Reddit is blocking the proxy.");
        console.error("RSS Error:", err);
    }
}


function addAlert(word, title, url){
    const box = document.getElementById("alerts");
    const div = document.createElement("div");
    div.className = "alert";
    div.innerHTML = `
        <span class="keyword">FOUND: ${word.toUpperCase()}</span><br>
        ${title}<br>
        <a href="${url}" target="_blank" style="color:#6cf;">View on Reddit</a>
    `;
    box.prepend(div);
}
</script>

</body>
</html>
