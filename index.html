<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>News Monitoring Bot</title>
<style>
    body{ font-family:Arial; background:#111; color:#eee; margin:20px; }
    h1{ color:#6cf; }
    #alerts{ margin-top:20px; }
    .alert{ background:#222; padding:10px; margin-bottom:10px; border-left:4px solid #6cf; }
    .keyword{ color:#ff6; font-weight:bold; }
    #log{ background:#000; padding:10px; margin-top:20px; height:150px; overflow-y:auto; font-family:monospace; font-size:13px; border:1px solid #444; }
    .logline{ color:#aaa; }
</style>
</head>
<body>

<h1>Live Monitoring Bot (Google News)</h1>
<div>
    Keywords: <input id="keywords" value="earthquake, volcano, eruption" style="width:300px;">
    <button onclick="startBot()">Start Bot</button>
</div>

<div id="status" style="margin-top:10px; color:#888;"></div>
<h2>Alerts</h2>
<div id="alerts"></div>
<h2>System Activity</h2>
<div id="log"></div>

<script>
let seenPosts = new Set();
let keywords = [];

function log(message){
    const logBox = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    const line = document.createElement("div");
    line.className="logline";
    line.textContent = `[${time}] ${message}`;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
}

function startBot(){
    const input = document.getElementById("keywords").value;
    keywords = input.toLowerCase().split(",").map(x=>x.trim());
    document.getElementById("status").innerText="Bot running... checking every 2 minutes";
    log("Bot started. Monitoring Google News.");
    
    checkNews();
    // Checking every 2 minutes to avoid proxy rate limits
    setInterval(checkNews, 120000); 
}

async function checkNews(){
    log("Fetching fresh news...");
    
    // Google News RSS is pre-filtered by your keywords
    const query = keywords.join(" OR ");
    const googleRSS = `https://news.google.com{encodeURIComponent(query)}&hl=en-US&gl=US&ceid=US:en`;
    
    // NEW PROXY: CORSproxy.io
    const proxyUrl = `https://corsproxy.io{encodeURIComponent(googleRSS)}`;

    try {
        const res = await fetch(proxyUrl);
        if(!res.ok) throw new Error("Proxy connection failed");
        
        const text = await res.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "text/xml");
        const items = xml.querySelectorAll("item");

        let newMatches = 0;
        items.forEach(item => {
            const guid = item.querySelector("guid")?.textContent;
            const title = item.querySelector("title")?.textContent;
            const link = item.querySelector("link")?.textContent;

            if (guid && !seenPosts.has(guid)) {
                seenPosts.add(guid);
                addAlert("NEWS", title, link);
                newMatches++;
            }
        });

        log(`Scan complete. Found ${newMatches} new matches.`);
    } catch (err) {
        log("Network Error: Proxy blocked or offline.");
        console.error(err);
    }
}

function addAlert(word, title, url){
    const box = document.getElementById("alerts");
    const div = document.createElement("div");
    div.className="alert";
    div.innerHTML = `
        <span class="keyword">${word}</span> detected<br>
        ${title}<br>
        <a href="${url}" target="_blank" style="color:#6cf;">Read Article</a>
    `;
    box.prepend(div);
}
</script>
</body>
</html>
