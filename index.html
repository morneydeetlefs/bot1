<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Internet Monitoring Bot</title>

<style>

body{
font-family:Arial;
background:#111;
color:#eee;
margin:20px;
}

h1{color:#6cf;}

#alerts{
margin-top:20px;
}

.alert{
background:#222;
padding:10px;
margin-bottom:10px;
border-left:4px solid #6cf;
}

.keyword{
color:#ff6;
font-weight:bold;
}

#log{
background:#000;
padding:10px;
margin-top:20px;
height:200px;
overflow-y:auto;
font-family:monospace;
font-size:13px;
border:1px solid #444;
}

.logline{
color:#aaa;
}

</style>
</head>

<body>

<h1>Live Monitoring Bot</h1>

<div>
Keywords:
<input id="keywords" value="earthquake, volcano, eruption">
<button onclick="startBot()">Start Bot</button>
</div>

<div id="status"></div>

<h2>Alerts</h2>
<div id="alerts"></div>

<h2>Bot Activity</h2>
<div id="log"></div>

<script>

let seenPosts = new Set();
let keywords = [];

function log(message){

const logBox = document.getElementById("log");

const time = new Date().toLocaleTimeString();

const line = document.createElement("div");

line.className="logline";

line.textContent = `[${time}] ${message}`;

logBox.appendChild(line);

logBox.scrollTop = logBox.scrollHeight;

}

function startBot(){

const input = document.getElementById("keywords").value;

keywords = input
.toLowerCase()
.split(",")
.map(x=>x.trim());

document.getElementById("status").innerText="Bot running...";

log("Bot started");
log("Keywords loaded: " + keywords.join(", "));

setInterval(checkReddit,60000);

checkReddit();

}

async function checkReddit(){

log("Fetching Reddit posts");

try{

const res = await fetch(
"https://www.reddit.com/r/news/new.json?limit=10"
);

const data = await res.json();

const posts = data.data.children;

log(posts.length + " posts retrieved");

posts.forEach(p=>{

const id = p.data.id;

if(seenPosts.has(id)) return;

seenPosts.add(id);

const title = p.data.title.toLowerCase();

keywords.forEach(word=>{

if(title.includes(word)){

log(`Keyword detected: ${word}`);

addAlert(word,p.data.title,p.data.url);

}

});

});

}catch(err){

log("Fetch error");

}

}

function addAlert(word,title,url){

const box = document.getElementById("alerts");

const div = document.createElement("div");

div.className="alert";

div.innerHTML = `
<span class="keyword">${word}</span> detected<br>
${title}<br>
<a href="${url}" target="_blank">Open post</a>
`;

box.prepend(div);

}

</script>

</body>
</html>
